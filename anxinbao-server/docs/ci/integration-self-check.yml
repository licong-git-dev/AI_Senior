# 集成真实性自检（仓库根 CI）
#
# 目的：杜绝"凭据缺失 / 密钥占位 / 内存存储等假完成项"被合并进 main。
# 行为：
#   1) 在 PR 与 main push 上运行
#   2) 普通模式：仅打印每个集成的 real/placeholder/missing/weak 状态（信息）
#   3) Strict 模式：模拟生产环境（DEBUG=false + 默认占位密钥），
#      `check_integrations.py --strict` 必须以非零退出码失败 —— 这是为了证明
#      生产门真的能拦住缺凭据的提交，如果它意外"通过"反而说明守卫被绕过。
#
# 注：仓库内还有另一份 anxinbao-server/.github/workflows/* 是历史拆分前的工作流，
# 在当前 monorepo 布局下不会被 GitHub Actions 执行。本文件是仓库根唯一生效的 CI。

name: Integration Self-Check

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  inspect:
    name: 集成状态信息（非阻断）
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: anxinbao-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: anxinbao-server/requirements.txt
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: 打印集成真实性快照
        env:
          DEBUG: "true"
          DATABASE_URL: "sqlite://"
        run: python scripts/check_integrations.py

  production-gate:
    name: 生产就绪门（守卫验真）
    runs-on: ubuntu-latest
    needs: inspect
    defaults:
      run:
        working-directory: anxinbao-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: anxinbao-server/requirements.txt
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 验证 strict 模式真能拦截"无真实凭据的生产配置"
        env:
          DEBUG: "false"
          DATABASE_URL: "sqlite://"
        run: |
          set +e
          python scripts/check_integrations.py --strict
          rc=$?
          if [ "$rc" -eq 0 ]; then
            echo "::error::策略缺陷：strict 自检在缺凭据生产环境意外通过。"
            echo "::error::排查 anxinbao-server/scripts/check_integrations.py 的 critical_missing 判定。"
            exit 1
          fi
          echo "✅ 守卫按预期拦截（exit=$rc），即缺凭据时不会让生产配置上线。"

      - name: 验证 strict 模式在凭据齐全时能通过
        # 这里的"凭据"是 fixture 而非真实密钥；之所以能通过是因为它们不命中
        # _PLACEHOLDER_HINTS（test_/your_/xxx/changeme/placeholder/example/please-replace）。
        # 真生产部署用的是云厂商签发的真实密钥，逻辑一致。
        env:
          DEBUG: "false"
          DATABASE_URL: "sqlite://"
          JWT_SECRET_KEY: "ci-fixture-jwt-secret-min-32-chars-long-for-gate-validation"
          ENCRYPTION_KEY: "ci-fixture-encryption-key-base64-format-strong-random-here"
          DASHSCOPE_API_KEY: "ci-fixture-dashscope-key"
          XFYUN_APPID: "ci-fixture-xfyun-appid"
          XFYUN_API_KEY: "ci-fixture-xfyun-api-key"
          XFYUN_API_SECRET: "ci-fixture-xfyun-api-secret"
          ALIYUN_ACCESS_KEY_ID: "ci-fixture-aliyun-access-key-id"
          ALIYUN_ACCESS_KEY_SECRET: "ci-fixture-aliyun-access-key-secret"
          SMS_TEMPLATE_EMERGENCY: "SMS_CIFIX_001"
          JPUSH_APP_KEY: "ci-fixture-jpush"
          ALIPAY_APP_ID: "ci-fixture-alipay-app-id"
          ALIPAY_PRIVATE_KEY: "-----BEGIN-CI-FIXTURE-KEY-----"
          ALIPAY_PUBLIC_KEY: "-----BEGIN-CI-FIXTURE-PUBLIC-----"
        run: python scripts/check_integrations.py --strict
