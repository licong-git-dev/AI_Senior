[pytest]
# 测试目录
testpaths = tests

# 异步测试模式
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# 测试文件匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出格式
addopts =
    -v
    --tb=short
    --strict-markers
    -ra

# 标记定义
markers =
    unit: 单元测试
    integration: 集成测试
    api: API端点测试
    slow: 慢速测试（跳过时使用 -m "not slow"）
    security: 安全相关测试
    ai: AI服务相关测试

# 覆盖率配置
[coverage:run]
source = app
omit =
    */tests/*
    */__pycache__/*
    */migrations/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
fail_under = 70
